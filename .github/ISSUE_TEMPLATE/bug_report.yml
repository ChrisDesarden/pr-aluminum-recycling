name: Reporte de error (bug)
description: Reporta algo que se rompe, no se ve bien, o no funciona como debería.
title: "[bug] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ¡Gracias por reportar un error! Por favor completa lo que puedas
        de las siguientes secciones. Si no tienes toda la información,
        no te preocupes —basta con describir el problema con claridad.

  - type: textarea
    id: que-paso
    attributes:
      label: ¿Qué pasó?
      description: Describe el error con el mayor detalle posible.
      placeholder: |
        Ejemplo: Al hacer clic en el botón "ES/EN" en el encabezado, la
        página se queda en blanco y la consola muestra "Uncaught TypeError".
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: ¿Qué esperabas que pasara?
      description: Lo que debería haber ocurrido en su lugar.
      placeholder: |
        Ejemplo: Que la página cambiara al idioma seleccionado sin errores
        en la consola.
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      description: Una lista numerada paso a paso.
      placeholder: |
        1. Abrir http://127.0.0.1:8765/
        2. Hacer clic en el selector de idioma
        3. Elegir "EN"
        4. Ver error
    validations:
      required: false

  - type: input
    id: captura
    attributes:
      label: Captura de pantalla (opcional)
      description: Arrastra una imagen aquí o pega una URL.
      placeholder: ""

  - type: dropdown
    id: entorno
    attributes:
      label: Entorno
      description: ¿Dónde lo viste?
      options:
        - Sitio en producción (GitHub Pages)
        - Servidor local (python3 -m http.server 8765)
        - PDF (docs/recircular-onepage.pdf)
        - Otro (explica en "Notas adicionales")
    validations:
      required: false

  - type: input
    id: navegador
    attributes:
      label: Navegador y sistema operativo
      description: "Ej: Firefox 130 en Windows 11, Chrome 130 en macOS 14, Safari 17 en iOS 17."
      placeholder: ""
    validations:
      required: false

  - type: textarea
    id: notas
    attributes:
      label: Notas adicionales
      description: Cualquier contexto extra (errores de consola, dispositivo móvil, modo claro/oscuro, etc.).
      placeholder: ""
    validations:
      required: false
